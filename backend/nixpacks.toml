[phases.setup]
nixPkgs = ['python3', 'postgresql_16.dev', 'gcc', 'cairo.dev', 'pkg-config', 'gobject-introspection']

[phases.install]
cmds = ['python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt']

[start]
cmd = 'python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT'
